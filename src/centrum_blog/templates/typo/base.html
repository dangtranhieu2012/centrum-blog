<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Reluctant Technical Blogger</title>
    <!-- Bulma CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='styles/code-hili.css') }}" rel="stylesheet" />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400..700;1,400..700&amp;family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', filename='styles/main.css') }}" rel="stylesheet" />
  </head>
  <body>
    <nav aria-label="main navigation" class="navbar is-fixed-top" role="navigation">
      <div class="container">
        <div class="navbar-brand">
          <a class="navbar-item" href="/">The Reluctant Technical Blogger</a>
        </div>
        <div class="navbar-menu" id="navbarMenu">
          <div class="navbar-end">
            <div class="navbar-item" style="gap: 3rem">
              <a class="navbar-link-custom" href="/">Home</a>
              <a class="navbar-link-custom" href="/about">About</a>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <!-- Main Content -->
    {% block content %}{% endblock %}
    <footer class="footer-custom">
      <div class="container is-max-w-7xl">
        <div class="level">
          <div class="level-left">
            <p class="footer-text">© {{ now.year }} by Tran Hieu Dang. Licensed under CC BY 4.0.</p>
          </div>
        </div>
      </div>
    </footer>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll(".navbar-burger"), 0);
        if ($navbarBurgers.length > 0) {
          $navbarBurgers.forEach((el) => {
            el.addEventListener("click", () => {
              const target = el.dataset.target;
              const $target = document.getElementById(target);
              el.classList.toggle("is-active");
              $target.classList.toggle("is-active");
            });
          });
        }
      });
    </script>
  </body>
</html>
